<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Laboratory Test Availability Status Tracker</title>
  
  <!-- Tailwind CSS for high-quality, lightweight styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Inter', 'Noto Sans Devanagari', sans-serif;
      background-color: #f4f6f9;
    }
    /* Custom style matching the brand-blue top header block */
    .brand-gradient {
      background: linear-gradient(135deg, #1e40af 0%, #1d4ed8 100%);
    }
    /* Dynamic status badges */
    .badge-updating {
      background-color: #fef3c7 !important; /* Soft Amber */
      color: #b45309 !important;            /* Rich Amber Text */
      border: 1px solid #fde68a !important;
    }
    .badge-danger {
      background-color: #fee2e2 !important; /* Soft Red */
      color: #b91c1c !important;            /* High-contrast Alert Red */
      border: 1px solid #fca5a5 !important;
    }
    .badge-unreported {
      background-color: #f3f4f6 !important; /* Soft Gray */
      color: #4b5563 !important;            /* Dark Gray Text */
      border: 1px solid #e5e7eb !important;
    }
  </style>
</head>
<body class="text-gray-800 antialiased min-h-screen pb-12">

  <!-- ==========================================
       HEADER & MAIN BRAND BANNER
       ========================================== -->
  <div class="brand-gradient text-white text-center py-8 px-4 rounded-b-[2.5rem] shadow-lg">
    <h1 class="text-2xl md:text-3xl font-bold tracking-tight mb-2">उत्तर प्रदेश स्वास्थ्य विभाग</h1>
    <p class="text-sm md:text-base font-medium opacity-90 mb-4">
      Live Laboratory Test Availability Status Tracker (<span id="district-label">Loading... District</span>)
    </p>
    <div class="inline-block bg-white text-blue-900 font-semibold px-4 py-1.5 rounded-full text-xs md:text-sm shadow-sm">
      Date: <span id="current-date">Loading...</span>
    </div>
  </div>

  <!-- ==========================================
       MAIN FILTER DASHBOARD CARD
       ========================================== -->
  <div class="max-w-md mx-auto -mt-6 px-4">
    <div class="bg-white rounded-2xl shadow-xl p-6 mb-6">
      
      <!-- Facility Selection Dropdown -->
      <div class="mb-4">
        <label class="block text-xs font-bold text-gray-500 tracking-wider uppercase mb-2">
          SELECT LABORATORY FACILITY / प्रयोगशाला इकाई का चयन करें
        </label>
        <select id="facility-select" class="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out">
          <option value="ALL">All Facilities / सभी प्रयोगशालाएं</option>
        </select>
      </div>

      <!-- Test Search Shorthand Input -->
      <div>
        <label class="block text-xs font-bold text-gray-500 tracking-wider uppercase mb-2">
          SEARCH DIAGNOSTIC TEST / जांच का नाम खोजें
        </label>
        <input type="text" id="test-search" placeholder="Type shorthand or name (e.g. TLC, Hb, Sugar)..." 
               class="w-full bg-gray-50 border border-gray-300 text-gray-900 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out">
      </div>

    </div>

    <!-- ==========================================
         RENDERED STATUS BOARD/CONTAINER
         ========================================== -->
    <div id="status-container" class="space-y-4">
      <!-- Dynamic loading state / Connection log block -->
      <div id="connection-loader" class="bg-white rounded-2xl p-8 text-center shadow-md">
        <h3 class="text-xl font-bold text-gray-800 mb-2">Connecting...</h3>
        <span class="inline-flex items-center px-4 py-2 rounded-full text-sm font-semibold bg-amber-50 text-amber-700 border border-amber-200">
          <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-amber-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Loading Repository Cache...
        </span>
      </div>
    </div>

  </div>

  <!-- ==========================================
       FRONT-END APPLICATION ARCHITECTURE
       ========================================== -->
  <script>
    // 1. Expanded Regional Dynamic Registry Mapping
    const DISTRICT_REGISTRY = {
      "lucknow": {
        name: "Lucknow",
        facilities: [
          { id: "CHC Gosaiganj", display: "CHC Gosaiganj / सी.एच.सी. गोसाईगंज" },
          { id: "CHC Kakori", display: "CHC Kakori / सी.एच.सी. काकोरी" },
          { id: "CHC Malihabad", display: "CHC Malihabad / सी.एच.सी. मलिहाबाद" },
          { id: "CHC Chinhat", display: "CHC Chinhat / सी.एच.सी. चिनहट" },
          { id: "CHC Mohanlalganj", display: "CHC Mohanlalganj / सी.एच.सी. मोहनलालगंज" },
          { id: "CHC Bakshi Ka Talab", display: "CHC Bakshi Ka Talab / सी.एच.सी. बख्शी का तालाब" },
          { id: "CHC Mal", display: "CHC Mal / सी.एच.सी. माल" },
          { id: "CHC Sarojini Nagar", display: "CHC Sarojini Nagar / सी.एच.सी. सरोजनी नगर" }
        ]
      },
      "agra": {
        name: "Agra",
        facilities: [
          { id: "Achhnera", display: "CHC Achhnera / सी.एच.सी. अछनेरा" },
          { id: "Akola", display: "CHC Akola / सी.एच.सी. अकोला" },
          { id: "Bah", display: "CHC Bah / सी.एच.सी. बाह" },
          { id: "Barauli Ahir", display: "CHC Barauli Ahir / सी.एच.सी. बरौली अहीर" },
          { id: "CHC Bichpuri", display: "CHC Bichpuri / सी.एच.सी. बिचपुरी" },
          { id: "CHC Etmadpur", display: "CHC Etmadpur / सी.एच.सी. एतमादपुर" },
          { id: "Fatehabad", display: "CHC Fatehabad / सी.एच.सी. फतेहाबाद" },
          { id: "Fatehpur Sikri", display: "CHC Fatehpur Sikri / सी.एच.सी. फतेहपुर सीकरी" },
          { id: "Jagner", display: "CHC Jagner / सी.एच.सी. जगनेर" },
          { id: "Jaitpur Kalan", display: "CHC Jaitpur Kalan / सी.एच.सी. जैतपुर कलां" },
          { id: "Khandauli", display: "CHC Khandauli / सी.एच.सी. खन्दौली" },
          { id: "CHC Kheragarh", display: "CHC Kheragarh / सी.एच.सी. खेरागढ़" },
          { id: "Pinahat", display: "CHC Pinahat / सी.एच.सी. पिनाहट" },
          { id: "Saiya", display: "CHC Saiya / सी.एच.सी. सैंया" },
          { id: "Shamsabad", display: "CHC Shamsabad / सी.एच.सी. शमसाबाद" }
        ]
      },
      "aligarh": {
        name: "Aligarh",
        facilities: [
          { id: "Atrauli", display: "Atrauli / अतरौली" },
          { id: "Gonda", display: "Gonda / गोंडा" },
          { id: "Iglas", display: "Iglas / इग्लास" },
          { id: "Jawa", display: "Jawa / जवां" },
          { id: "Khair", display: "Khair / खैर" },
          { id: "Lodha", display: "Lodha / लोधा" },
          { id: "Tappal", display: "Tappal / टप्पल" },
          { id: "Dhanipur", display: "Dhanipur / धनीपुर" },
          { id: "Bijouli", display: "Bijouli / बिजौली" },
          { id: "CHC Akrabad", display: "CHC Akrabad / सी.एच.सी. अकराबाद" },
          { id: "CHC Chandaus", display: "CHC Chandaus / सी.एच.सी. चंडौस" },
          { id: "Chharra", display: "Chharra / छर्रा" }
        ]
      },
      "ambedkarnagar": {
        name: "Ambedkar Nagar",
        facilities: [
          { id: "Akbarpur", display: "Akbarpur / अकबरपुर" },
          { id: "Baskhari", display: "Baskhari / बसखारी" },
          { id: "Jahangirganj", display: "Jahangirganj / जहांगीरगंज" },
          { id: "Jalalpur", display: "Jalalpur / जलालपुर" },
          { id: "Katehari", display: "Katehari / कटेहरी" },
          { id: "CHC Alapur", display: "CHC Alapur / सी.एच.सी. आलापुर" },
          { id: "CHC Bhiti", display: "CHC Bhiti / सी.एच.सी. भीटी" },
          { id: "Bhiyaon", display: "Bhiyaon / भियांव" },
          { id: "Tanda", display: "Tanda / टांडा" }
        ]
      },
      "amethi": {
        name: "Amethi",
        facilities: [
          { id: "Amethi", display: "Amethi / अमेठी" },
          { id: "Fursatganj", display: "Fursatganj / फुर्सतगंज" },
          { id: "Bhadar", display: "Bhadar / भादर" },
          { id: "Bhetua", display: "Bhetua / भेंटुआ" },
          { id: "Gauriganj", display: "Gauriganj / गौरीगंज" },
          { id: "Musafirkhana", display: "Musafirkhana / मुसाफिरखाना" },
          { id: "Sangrampur", display: "Sangrampur / संग्रामपुर" },
          { id: "Shahgarh", display: "Shahgarh / शाहगढ़" },
          { id: "Tiloi", display: "Tiloi / तिलोई" },
          { id: "CHC Jagdishpur", display: "CHC Jagdishpur / सी.एच.सी. जगदीशपुर" },
          { id: "CHC Singhpur", display: "CHC Singhpur / सी.एच.सी. सिंहपुर" },
          { id: "Jamo", display: "Jamo / जामो" },
          { id: "Shukul Bazar", display: "Shukul Bazar / शुकुल बाज़ार" }
        ]
      },
      "amroha": {
        name: "Amroha",
        facilities: [
          { id: "Hasanpur", display: "Hasanpur / हसनपुर" },
          { id: "Dhanaura", display: "Dhanaura / धनौरा" },
          { id: "Gajraula", display: "Gajraula / गजरोला" },
          { id: "Zoya", display: "Zoya / जोया" },
          { id: "CHC Gangeswari", display: "CHC Gangeswari / सी.एच.सी. गंगेश्वरी" },
          { id: "CHC Naugaon Sadat", display: "CHC Naugaon Sadat / सी.एच.सी. नौगावां सादात" }
        ]
      }
    };

    // 2. Global State Variable Registry
    let currentDistrict = "amroha"; // Standard default
    let expectedFacilities = [];
    let apiData = {};

    // 3. Extract and parse route params (e.g., index.html?district=lucknow)
    const urlParams = new URLSearchParams(window.location.search);
    const routeDistrict = urlParams.get('district');
    if (routeDistrict && DISTRICT_REGISTRY[routeDistrict.toLowerCase().trim()]) {
      currentDistrict = routeDistrict.toLowerCase().trim();
    }

    // Set configuration variables relative to active district
    const activeConfig = DISTRICT_REGISTRY[currentDistrict];
    expectedFacilities = activeConfig.facilities;
    
    // UI Label Initialization
    document.getElementById("district-label").innerText = activeConfig.name;
    document.getElementById("current-date").innerText = new Date().toLocaleDateString('en-IN', {
      day: '2-digit', month: 'short', year: 'numeric'
    });

    // Populate the dropdown selectively using the display translation values
    const dropdownSelect = document.getElementById("facility-select");
    expectedFacilities.forEach(facilityObj => {
      let opt = document.createElement("option");
      opt.value = facilityObj.id;
      opt.innerText = facilityObj.display;
      dropdownSelect.appendChild(opt);
    });

    // 4. Data Extraction Engine from GitHub Repository Endpoint
    const repoOwner = "AmazonianAnkit";
    const repoName = "UP-health-dashboard";
    const dataUrl = `https://${repoOwner}.github.io/${repoName}/${currentDistrict}/Data.json`;

    async function fetchTrackerPayload() {
      const loader = document.getElementById("connection-loader");
      const container = document.getElementById("status-container");

      try {
        const response = await fetch(dataUrl + '?nocache=' + new Date().getTime());
        if (!response.ok) throw new Error("File not found on repository CDN");
        
        apiData = await response.json();
        if (loader) loader.style.display = "none";
        renderDashboard();
      } catch (err) {
        console.error("Fetch Exception:", err);
        container.innerHTML = `
          <div class="bg-red-50 border border-red-200 text-red-800 rounded-2xl p-6 text-center shadow-sm">
            <h4 class="font-bold text-lg mb-1">Configuration Offline</h4>
            <p class="text-sm opacity-90 mb-3">Unable to locate live data for ${activeConfig.name}.</p>
            <span class="text-xs font-mono bg-red-100 text-red-700 px-2.5 py-1 rounded">Path Error: 404 (Offline)</span>
          </div>
        `;
      }
    }

    // 5. Reactive UI Rendering Engine
    function renderDashboard() {
      const selectedFacilityId = dropdownSelect.value;
      const searchFilter = document.getElementById("test-search").value.toLowerCase().trim();
      const container = document.getElementById("status-container");
      container.innerHTML = "";

      expectedFacilities.forEach(facilityObj => {
        const facilityId = facilityObj.id;
        const facilityDisplay = facilityObj.display;

        // Filter out if dropdown has a specific lab locked
        if (selectedFacilityId !== "ALL" && selectedFacilityId !== facilityId) return;

        const facilityData = apiData[facilityId];
        let statusTitleEn = "";
        let statusTitleHi = "";
        let subTextEn = "";
        let subTextHi = "";
        let badgeClass = "";
        let testsListHTML = "";

        // Determine matching state of this specific facility
        if (apiData.hasOwnProperty(facilityId)) {
          const downtimes = facilityData || {};
          const downtimeKeys = Object.keys(downtimes);

          if (downtimeKeys.length === 0) {
            // ✅ TRANSITIONAL FALLBACK: Updation in progress state (0 active errors)
            statusTitleEn = "Updation in Progress";
            statusTitleHi = "अद्यतन प्रगति पर है";
            subTextEn = "Waiting for the lab's daily verification check-in.";
            subTextHi = "प्रयोगशाला के दैनिक सत्यापन चेक-इन की प्रतीक्षा है।";
            badgeClass = "badge-updating";
          } else {
            // Active Exception Downtimes Logged
            statusTitleEn = "Downtime Logged";
            statusTitleHi = "डाउनटाइम लॉग किया गया";
            subTextEn = `${downtimeKeys.length} test(s) currently unavailable.`;
            subTextHi = `${downtimeKeys.length} परीक्षण वर्तमान में अनुपलब्ध हैं।`;
            badgeClass = "badge-danger";

            // Process specific individual test lines
            let testRows = [];
            for (let test in downtimes) {
              // Apply input search query match if active
              if (searchFilter !== "" && !test.toLowerCase().includes(searchFilter)) continue;

              const tObj = downtimes[test];
              testRows.push(`
                <div class="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center py-2.5 border-b border-dashed border-red-100 last:border-b-0">
                  <span class="font-semibold text-sm text-gray-800">${test}</span>
                  <div class="text-left sm:text-right mt-1 sm:mt-0">
                    <span class="text-xs font-medium text-red-600 block">${tObj.reasonEn || 'Not Available'}</span>
                    <span class="text-[11px] text-red-500 block">${tObj.reasonHi || 'उपलब्ध नहीं'}</span>
                  </div>
                </div>
              `);
            }

            if (testRows.length > 0) {
              testsListHTML = `
                <div class="mt-4 bg-red-50/50 rounded-xl p-4 border border-red-100 max-h-60 overflow-y-auto">
                  ${testRows.join("")}
                </div>
              `;
            } else if (searchFilter !== "") {
              // If query filters out the current facility's entries
              return;
            }
          }
        } else {
          // Lab is entirely missing from the compiled json payload
          statusTitleEn = "Status Not Updated";
          statusTitleHi = "स्थिति अद्यतन नहीं है";
          subTextEn = "No reporting data received from this lab today.";
          subTextHi = "आज इस प्रयोगशाला से कोई रिपोर्टिंग डेटा प्राप्त नहीं हुआ है।";
          badgeClass = "badge-unreported";
        }

        // Output Card Markup Block
        const card = document.createElement("div");
        card.className = "bg-white rounded-2xl shadow-md border border-gray-100 p-5 hover:shadow-lg transition duration-200 ease-in-out";
        card.innerHTML = `
          <div class="flex items-start justify-between gap-4">
            <div>
              <h4 class="font-bold text-gray-900 text-lg leading-snug">${facilityDisplay}</h4>
              <p class="text-xs font-medium text-gray-500 mt-1">${subTextEn}</p>
              <p class="text-[11px] text-gray-400 mt-0.5">${subTextHi}</p>
            </div>
            <div class="text-right flex-shrink-0">
              <span class="inline-block px-3 py-1.5 rounded-lg text-xs font-bold shadow-sm ${badgeClass}">
                ${statusTitleEn}<br/>
                <span class="text-[10px] font-medium opacity-90">${statusTitleHi}</span>
              </span>
            </div>
          </div>
          ${testsListHTML}
        `;
        container.appendChild(card);
      });

      // Simple handling if searches yield nothing
      if (container.children.length === 0) {
        container.innerHTML = `
          <div class="bg-white rounded-2xl p-8 text-center shadow-md">
            <p class="text-sm font-semibold text-gray-500">No matching search entries found / कोई मिलान परिणाम नहीं मिला।</p>
          </div>
        `;
      }
    }

    // 6. Reactive UI DOM Listeners
    dropdownSelect.addEventListener("change", renderDashboard);
    document.getElementById("test-search").addEventListener("input", renderDashboard);

    // Bootstrap data pull on start
    fetchTrackerPayload();
  </script>
</body>
</html>
